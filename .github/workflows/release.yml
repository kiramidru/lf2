name: Compile to Tarball
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libglib2.0-dev \
            librsvg2-dev libsoup-3.0-dev libappindicator3-dev pkg-config build-essential

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0"

      - name: Build Binary
        run: |
          sed -i 's/"active": true/"active": false/g' src-tauri/tauri.conf.json
          cargo tauri build

      - name: Create Structured Tarball
        run: |
          export RELEASE_NAME="lf2-${{ github.ref_name }}"
          mkdir -p "$RELEASE_NAME"
          
          cp src-tauri/target/release/lf2 "$RELEASE_NAME/" || cp src-tauri/target/release/little-fighter-2 "$RELEASE_NAME/"
          cp -r dist "$RELEASE_NAME/"
          cp -r src-tauri/icons "$RELEASE_NAME/"
          tar -czvf lf2-linux-x86_64.tar.gz "$RELEASE_NAME/"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: lf2-linux-x86_64.tar.gz
