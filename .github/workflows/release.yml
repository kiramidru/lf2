name: Pure Rust Release
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libglib2.0-dev \
            librsvg2-dev libsoup-3.0-dev libappindicator3-dev \
            pkg-config build-essential

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0"

      - name: Build App
        run: cargo tauri build

      - name: Prepare Tarball
        run: |
          mkdir -p release
          cp src-tauri/target/release/lf2 release/
          tar -czvf lf2-linux-x86_64.tar.gz -C release .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lf2-linux-bin
          path: lf2-linux-x86_64.tar.gz
